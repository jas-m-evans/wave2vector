<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wave2Vector</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Wave2Vector</h1>

    <section class="upload">
      <h2>Upload a clip</h2>
      <form action="/upload" method="post" enctype="multipart/form-data">
        <label>
          Title
          <input type="text" name="title" placeholder="Optional title" />
        </label>
        <label>
          Audio file
          <input type="file" name="file" required />
        </label>
        <button type="submit">Upload</button>
      </form>
    </section>

    <section>
      <h2>Clips</h2>
      {% if clips %}
        <table class="clip-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Filename</th>
              <th>Duration</th>
              <th>Created</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody>
            {% for clip in clips %}
              <tr>
                <td>{{ clip.id }}</td>
                <td>{{ clip.filename }}</td>
                <td>{{ '%.2f'|format(clip.duration) }}s</td>
                <td>{{ clip.created_at }}</td>
                <td><a href="/clips/{{ clip.id }}">View</a></td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      {% else %}
        <p>No clips uploaded yet.</p>
      {% endif %}
    </section>
  </main>
</body>
</html>
